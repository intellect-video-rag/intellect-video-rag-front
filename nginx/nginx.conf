events {
    worker_connections 1024;
}

http {
    upstream keycloak_cluster {
        # Using ip_hash for sticky sessions (session affinity), standard for Keycloak HA
        ip_hash;
        server keycloak-1:8080;
        server keycloak-2:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://keycloak_cluster;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            
            # Keycloak-specific proxy settings for large headers
            proxy_buffers 16 16k;
            proxy_buffer_size 32k;
        }
    }
}
